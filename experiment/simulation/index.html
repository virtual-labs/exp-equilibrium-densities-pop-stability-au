<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Predator Efficiency — Equilibrium Densities & Population Stability — Simulation</title>
<link rel="stylesheet" href="./css/main.css">
</head>
<body>
<div class="card" id="simbox">
<div class="simbar"><span class="simbar-logo" aria-hidden="true"><img src="images\logo.svg" alt="Amrita Vishwa Vidyapeetham"></span><h1 class="simbar-title">Predator Efficiency — Equilibrium Densities &amp; Population Stability</h1><button class="fs-btn" id="fsBtn" onclick="toggleFS()" title="Toggle full screen" aria-label="Toggle full screen">⛶</button></div>
<div class="sim">
<div class="controls">
<p class="subnote">Rosenzweig–MacArthur-style model. The original Flash version's prey equation was mis-transcribed; this is the standard, mathematically-correct formulation.</p>
<label style="font-weight:600;font-size:.9rem;display:block;margin-bottom:6px">Mode</label>
<select class="dropBox" id="modeSel" onchange="run()">
  <option value="stab">Population stability (time series)</option>
  <option value="eq">Equilibrium densities vs predator efficiency</option>
</select>
<label style="font-weight:600;font-size:.9rem;display:block;margin-bottom:6px" id="plotLbl">Plot</label>
<select class="dropBox" id="plotMode" onchange="if(sim)drawChart()">
  <option value="both">Prey &amp; Predator vs time</option>
  <option value="prey">Prey vs time</option>
  <option value="pred">Predator vs time</option>
  <option value="phase">Phase plane</option>
</select>
<div class="field"><label>Initial prey <span class="val" id="v_prey">20</span></label><input type="range" id="prey" min="1" max="300" value="20" oninput="sync()"></div>
<div class="field"><label>Initial predator <span class="val" id="v_pred">30</span></label><input type="range" id="pred" min="1" max="200" value="30" oninput="sync()"></div>
<div class="field"><label>Prey growth r <span class="val" id="v_r">1</span></label><input type="range" id="r" min="0.1" max="3" step="0.05" value="1" oninput="sync()"></div>
<div class="field"><label>Carrying capacity K <span class="val" id="v_K">100</span></label><input type="range" id="K" min="20" max="400" step="10" value="100" oninput="sync()"></div>
<div class="field"><label>Shape θ <span class="val" id="v_th">1</span></label><input type="range" id="th" min="0.5" max="3" step="0.1" value="1" oninput="sync()"></div>
<div class="field"><label>Attack rate a <span class="val" id="v_a">0.02</span></label><input type="range" id="a" min="0.005" max="0.1" step="0.005" value="0.02" oninput="sync()"></div>
<div class="field"><label>Predator efficiency e <span class="val" id="v_e">0.03</span></label><input type="range" id="e" min="0.005" max="0.1" step="0.005" value="0.03" oninput="sync()"></div>
<div class="field"><label>Predator death d <span class="val" id="v_d">0.15</span></label><input type="range" id="d" min="0.02" max="0.5" step="0.01" value="0.15" oninput="sync()"></div>
<div class="field"><label>Number of steps <span class="val" id="v_steps">400</span></label><input type="range" id="steps" min="50" max="900" step="10" value="400" oninput="sync()"></div>
<div class="field"><label>Step size (Δt) <span class="val" id="v_stepSize">1</span></label><input type="range" id="stepSize" min="0.2" max="2" step="0.1" value="1" oninput="sync()"></div>
<div class="btnrow">
  <button class="btn btn-primary" onclick="run()">▶ Run</button>
  <button class="btn btn-ghost" onclick="play()" id="playBtn">Play ▶</button>
  <button class="btn btn-ghost" onclick="step()">Step ⏭</button>
  <button class="btn btn-ghost" onclick="resetSim()">↺ Reset</button>
</div>
<div class="dl-label">Download</div>
<div class="btnrow">
  <button class="btn btn-accent" onclick="downloadPNG('predator-efficiency.png')">⤓ PNG</button>
  <button class="btn btn-accent" onclick="downloadCSV()">⤓ CSV</button>
</div>
</div>
<div class="plotwrap">
<canvas class="field" id="field" width="720" height="260"></canvas>
<div class="counts" id="counts"></div>
<div class="plot-title" id="plotTitle">Prey & Predator vs time</div>
<canvas class="chart" id="chart" width="720" height="400"></canvas>
<div class="legend" id="legend"></div>
<div class="readout">Cursor: X = <b id="rx">–</b>, Y = <b id="ry">–</b></div>


</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="./js/chart.js"></script>
<script src="./js/common.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
